<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>激活码管理 - 5叔挑码助手</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif;background:#1a1a1a;color:#fff;min-height:100vh;padding:20px}
.container{max-width:500px;margin:0 auto}
h1{color:#e6c61a;font-size:20px;text-align:center;margin-bottom:20px}
.box{background:#222;border-radius:8px;padding:20px;margin-bottom:15px}
.box label{display:block;color:#888;font-size:12px;margin-bottom:6px}
.box input{width:100%;background:#111;border:1px solid #444;color:#fff;padding:12px;border-radius:6px;font-size:15px;text-align:center;letter-spacing:2px}
.box input::placeholder{color:#555}
.btn{width:100%;background:#e6c61a;color:#000;border:none;padding:14px;border-radius:6px;font-size:16px;font-weight:bold;cursor:pointer;margin-top:10px}
.btn:active{opacity:.8}
.result{background:#111;border:1px solid #444;border-radius:6px;padding:15px;margin-top:15px;text-align:center}
.result .label{color:#888;font-size:12px;margin-bottom:6px}
.result .code{color:#e6c61a;font-size:22px;font-weight:bold;letter-spacing:3px}
.copy-btn{background:#333;color:#e6c61a;border:1px solid #555;padding:10px;border-radius:6px;font-size:14px;cursor:pointer;margin-top:10px;width:100%}
.copy-btn:active{opacity:.7}
.history{background:#222;border-radius:8px;padding:15px;margin-top:15px}
.history h3{color:#e6c61a;font-size:14px;margin-bottom:10px}
.history-item{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #333;font-size:12px}
.history-item:last-child{border:none}
.history-item .dev{color:#888}
.history-item .act{color:#e6c61a}
.toast{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,.9);color:#e6c61a;padding:10px 20px;border-radius:8px;font-size:13px;z-index:9999;display:none}
.toast.show{display:block}
</style>
</head>
<body>
<div class="container">
  <h1>🔑 激活码管理工具</h1>
  
  <div class="box">
    <label>输入用户设备码</label>
    <input type="text" id="deviceInput" placeholder="如：A3F8-K9D2" maxlength="9" oninput="autoFormat(this)">
    <button class="btn" onclick="generate()">生成激活码</button>
  </div>
  
  <div class="result" id="resultBox" style="display:none">
    <div class="label">激活码（发给用户）</div>
    <div class="code" id="actCode">-</div>
    <button class="copy-btn" onclick="copyCode()">📋 复制激活码</button>
  </div>
  
  <div class="history" id="historyBox">
    <h3>📋 生成记录</h3>
    <div id="historyList"><div style="color:#666;font-size:12px;text-align:center;padding:10px">暂无记录</div></div>
    <button class="copy-btn" onclick="clearHistory()" style="margin-top:10px">清除记录</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// 生成激活码（与index.html中的算法一致）
function generateActivationCode(deviceId) {
  const reversed = deviceId.replace('-', '').split('').reverse().join('');
  return 'ACT' + reversed.substring(0, 4) + '5S';
}

// 自动格式化输入
function autoFormat(input) {
  let v = input.value.toUpperCase().replace(/[^A-Z0-9]/g, '');
  if (v.length > 4) {
    v = v.substring(0, 4) + '-' + v.substring(4, 8);
  }
  input.value = v;
}

// 生成激活码
function generate() {
  const deviceId = document.getElementById('deviceInput').value.trim().toUpperCase();
  
  if (!deviceId || deviceId.length < 9) {
    toast('请输入完整的设备码（格式：XXXX-XXXX）');
    return;
  }
  
  const actCode = generateActivationCode(deviceId);
  document.getElementById('actCode').textContent = actCode;
  document.getElementById('resultBox').style.display = 'block';
  
  // 保存到记录
  saveToHistory(deviceId, actCode);
}

// 复制激活码
function copyCode() {
  const code = document.getElementById('actCode').textContent;
  if (navigator.clipboard) {
    navigator.clipboard.writeText(code).then(() => toast('已复制'));
  } else {
    const ta = document.createElement('textarea');
    ta.value = code;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    toast('已复制');
  }
}

// 保存历史记录
function saveToHistory(deviceId, actCode) {
  let history = JSON.parse(localStorage.getItem('act_history') || '[]');
  // 检查是否已存在
  const idx = history.findIndex(h => h.device === deviceId);
  if (idx >= 0) {
    history[idx] = { device: deviceId, code: actCode, time: new Date().toLocaleString('zh-CN') };
  } else {
    history.unshift({ device: deviceId, code: actCode, time: new Date().toLocaleString('zh-CN') });
  }
  // 最多保存50条
  if (history.length > 50) history = history.slice(0, 50);
  localStorage.setItem('act_history', JSON.stringify(history));
  renderHistory();
}

// 渲染历史记录
function renderHistory() {
  const history = JSON.parse(localStorage.getItem('act_history') || '[]');
  const list = document.getElementById('historyList');
  
  if (!history.length) {
    list.innerHTML = '<div style="color:#666;font-size:12px;text-align:center;padding:10px">暂无记录</div>';
    return;
  }
  
  let html = '';
  history.forEach(h => {
    html += `<div class="history-item">
      <span class="dev">${h.device}</span>
      <span class="act">${h.code}</span>
    </div>`;
  });
  list.innerHTML = html;
}

// 清除记录
function clearHistory() {
  if (confirm('确定清除所有记录？')) {
    localStorage.removeItem('act_history');
    renderHistory();
    toast('已清除');
  }
}

// Toast提示
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show';
  setTimeout(() => t.className = 'toast', 1500);
}

// 初始化
renderHistory();
</script>
</body>
</html>
